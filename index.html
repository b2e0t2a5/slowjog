<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超慢跑社 · 跑步紀錄</title>
<style>
  :root {
    --bg: #FBF7F0;
    --bg-card: #FFFFFF;
    --ink: #2B2118;
    --ink-soft: #6B5D4F;
    --line: #E8DFD2;
    --accent: #D9622B;
    --accent-soft: #F4DCC9;
    --accent-deep: #A8431A;
    --pulse: #4F7A5C;
    --pulse-soft: #DCE9DD;
    --shadow: rgba(43, 33, 24, 0.08);
    --font-display: 'Zhi Mang Xing', 'Noto Serif TC', serif;
    --font-body: 'Noto Sans TC', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(217, 98, 43, 0.04) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(79, 122, 92, 0.05) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .brand-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  .pace-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.5;
  }

  .pace-badge strong {
    color: var(--pulse);
    font-size: 13px;
    display: block;
  }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .tab-btn {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .tab-btn.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .view { display: none; animation: fadeIn 0.35s ease; }
  .view.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Card ---------- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 18px;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ---------- Form ---------- */
  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .field-hint {
    font-size: 12px;
    color: var(--ink-soft);
    opacity: 0.7;
    margin-top: 6px;
  }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  textarea,
  select {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink);
    background: #FFFDFB;
    transition: border-color 0.2s ease;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 64px; }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* duration stepper */
  .duration-control {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stepper-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--bg-card);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-deep);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }

  .stepper-btn:active { transform: scale(0.92); background: var(--accent-soft); }

  .duration-display {
    flex: 1;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
  }

  .duration-display span {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-left: 4px;
  }

  .name-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .name-input-row input {
    flex: 1;
  }

  .add-name-btn {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: 1.5px solid var(--accent);
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }

  .add-name-btn:active {
    transform: scale(0.92);
    background: var(--accent);
    color: white;
  }

  /* partner chips */
  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .chip {
    padding: 9px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: var(--bg-card);
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
  }

  .chip.selected {
    background: var(--pulse-soft);
    border-color: var(--pulse);
    color: var(--pulse);
  }

  .mood-row {
    display: flex;
    gap: 8px;
  }

  .mood-btn {
    flex: 1;
    padding: 14px 0;
    border-radius: 14px;
    border: 1.5px solid var(--line);
    background: var(--bg-card);
    font-size: 22px;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .mood-btn.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: scale(1.06);
  }

  /* submit button */
  .submit-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--font-body);
    font-size: 15.5px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .submit-feedback {
    text-align: center;
    font-size: 13px;
    color: var(--pulse);
    margin-top: 12px;
    font-weight: 600;
    min-height: 18px;
  }

  /* ---------- Stats view ---------- */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }

  .stat-box {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 10px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--accent-deep);
    line-height: 1.2;
  }

  .stat-label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .month-nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg-card);
    font-size: 16px;
    cursor: pointer;
    color: var(--ink-soft);
  }

  .month-label {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
  }

  .leaderboard-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }

  .leaderboard-item:last-child { border-bottom: none; }

  .lb-rank {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--pulse-soft);
    color: var(--pulse);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .lb-rank.rank-1 { background: var(--accent-soft); color: var(--accent-deep); }

  .lb-name { flex: 1; font-size: 14.5px; font-weight: 600; }
  .lb-meta { font-size: 12px; color: var(--ink-soft); }

  .lb-bar-track {
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    margin-top: 6px;
    overflow: hidden;
  }

  .lb-bar-fill {
    height: 100%;
    background: var(--pulse);
    border-radius: 999px;
    transition: width 0.6s ease;
  }

  .log-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }

  .log-item:last-child { border-bottom: none; }

  .log-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .log-date {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
  }

  .log-duration {
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--accent-deep);
    font-size: 14px;
  }

  .log-detail {
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  .log-mood { font-size: 16px; margin-right: 4px; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
  }

  .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.6; }
  .empty-state-text { font-size: 13.5px; line-height: 1.6; }

  .report-box {
    background: var(--ink);
    color: var(--bg);
    border-radius: 16px;
    padding: 18px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: 1.8;
    white-space: pre-wrap;
    margin-bottom: 12px;
  }

  .copy-btn {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }

  .copy-btn.copied {
    background: var(--pulse);
    border-color: var(--pulse);
    color: white;
  }

  .loading-spin {
    text-align: center;
    padding: 30px;
    color: var(--ink-soft);
    font-size: 13px;
  }

  @media (max-width: 420px) {
    .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-num { font-size: 20px; }
    .brand-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <div class="brand-eyebrow">Slow Jogging Club</div>
      <div class="brand-title">超慢跑社</div>
    </div>
    <div class="pace-badge">
      心率不超過<br><strong>喘但能說話</strong>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="record">✏️ 登錄紀錄</button>
    <button class="tab-btn" data-tab="stats">📊 社團統計</button>
  </div>

  <!-- ============ RECORD VIEW ============ -->
  <div class="view active" id="view-record">
    <div class="card">
      <div class="card-title"><span class="dot"></span>今天跑了嗎</div>

      <div class="field">
        <label>日期</label>
        <input type="date" id="f-date">
      </div>

      <div class="field">
        <label>跑步時數</label>
        <div class="duration-control">
          <button class="stepper-btn" id="dur-minus">−</button>
          <div class="duration-display" id="dur-display">30<span>分鐘</span></div>
          <button class="stepper-btn" id="dur-plus">+</button>
        </div>
      </div>

      <div class="field">
        <label>地點</label>
        <input type="text" id="f-location" placeholder="例如：河濱公園、學校操場">
      </div>

      <div class="field">
        <label>距離 (公里，選填)</label>
        <input type="number" id="f-distance" placeholder="例如：3.5" step="0.1" min="0">
      </div>

      <div class="field">
        <label>跑步者</label>
        <div class="chip-group" id="runner-chips"></div>
        <div class="name-input-row">
          <input type="text" id="f-runner-other" placeholder="輸入新名字">
          <button class="add-name-btn" id="add-runner-btn">＋</button>
        </div>
        <div class="field-hint">這次紀錄是誰跑的，可多選</div>
      </div>

      <div class="field">
        <label>陪跑夥伴 (選填)</label>
        <div class="chip-group" id="partner-chips"></div>
        <div class="name-input-row">
          <input type="text" id="f-partner-other" placeholder="輸入新名字">
          <button class="add-name-btn" id="add-partner-btn">＋</button>
        </div>
        <div class="field-hint">這次有誰一起陪跑，沒有就留空</div>
      </div>

      <div class="field">
        <label>今天的心情</label>
        <div class="mood-row" id="mood-row">
          <button class="mood-btn" data-mood="🔥">🔥</button>
          <button class="mood-btn" data-mood="😊">😊</button>
          <button class="mood-btn" data-mood="😮‍💨">😮‍💨</button>
          <button class="mood-btn" data-mood="😣">😣</button>
          <button class="mood-btn" data-mood="🌧️">🌧️</button>
        </div>
      </div>

      <div class="field">
        <label>備註 (選填)</label>
        <textarea id="f-note" placeholder="今天的路線、天氣，或任何想記下的事"></textarea>
      </div>

      <button class="submit-btn" id="submit-btn">送出紀錄</button>
      <div class="submit-feedback" id="submit-feedback"></div>
    </div>
  </div>

  <!-- ============ STATS VIEW ============ -->
  <div class="view" id="view-stats">

    <div class="month-nav">
      <button class="month-nav-btn" id="month-prev">‹</button>
      <div class="month-label" id="month-label">2026 年 6 月</div>
      <button class="month-nav-btn" id="month-next">›</button>
    </div>

    <div class="stat-grid" id="stat-grid">
      <div class="stat-box"><div class="stat-num" id="stat-sessions">–</div><div class="stat-label">本月次數</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-minutes">–</div><div class="stat-label">總分鐘</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-distance">–</div><div class="stat-label">總公里</div></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span>本月跑步榜</div>
      <div id="leaderboard"><div class="loading-spin">讀取中…</div></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span>本月紀錄</div>
      <div id="log-list"><div class="loading-spin">讀取中…</div></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span>月報文字 · 一鍵複製到 LINE</div>
      <div class="report-box" id="report-box">準備中…</div>
      <button class="copy-btn" id="copy-report-btn">複製月報文字</button>
    </div>
  </div>

</div>

<script>
/* ===================== State ===================== */
let allRecords = [];
let knownPartners = [];
let selectedRunners = new Set();
let selectedPartners = new Set();
let selectedMood = null;
let durationMinutes = 30;
let viewingMonth = new Date();
let isSubmitting = false;

// ============================================================
// 設定區 — 部署好 Apps Script 之後，把網址和密語貼在這裡
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwL_hQsYcdM8xwLlLLblh6R-NlqMiqop5Z8xv2aZW_dLJkP75gy_SbPLKSjFHrjcHx42A/exec';
const SHARED_SECRET = 'runclub2026';

const STORAGE_KEY_PARTNERS = 'partners:known'; // 人名庫仍用內建儲存，跨裝置共用

/* ===================== Init ===================== */
document.getElementById('f-date').valueAsDate = new Date();

function init() {
  if (APPS_SCRIPT_URL.indexOf('請貼上') === 0) {
    showFeedback('尚未設定 Apps Script 網址，請參考設定教學文件', false);
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  document.getElementById('dur-minus').addEventListener('click', () => adjustDuration(-5));
  document.getElementById('dur-plus').addEventListener('click', () => adjustDuration(5));

  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => selectMood(btn));
  });

  function addRunner() {
    const input = document.getElementById('f-runner-other');
    const name = input.value.trim();
    if (name) {
      addNewNameToPool(name);
      toggleRunner(name);
      input.value = '';
      input.focus();
    }
  }

  function addPartner() {
    const input = document.getElementById('f-partner-other');
    const name = input.value.trim();
    if (name) {
      addNewNameToPool(name);
      togglePartner(name);
      input.value = '';
      input.focus();
    }
  }

  document.getElementById('f-runner-other').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); addRunner(); }
  });
  document.getElementById('add-runner-btn').addEventListener('click', addRunner);

  document.getElementById('f-partner-other').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); addPartner(); }
  });
  document.getElementById('add-partner-btn').addEventListener('click', addPartner);

  document.getElementById('submit-btn').addEventListener('click', submitRecord);
  document.getElementById('month-prev').addEventListener('click', () => changeMonth(-1));
  document.getElementById('month-next').addEventListener('click', () => changeMonth(1));
  document.getElementById('copy-report-btn').addEventListener('click', copyReport);

  loadKnownPartners();
  loadAllRecords();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('view-record').classList.toggle('active', tab === 'record');
  document.getElementById('view-stats').classList.toggle('active', tab === 'stats');
  if (tab === 'stats') renderStats();
}

function adjustDuration(delta) {
  durationMinutes = Math.max(5, Math.min(240, durationMinutes + delta));
  document.getElementById('dur-display').innerHTML = durationMinutes + '<span>分鐘</span>';
}

function selectMood(btn) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  if (selectedMood === btn.dataset.mood) {
    selectedMood = null;
  } else {
    btn.classList.add('selected');
    selectedMood = btn.dataset.mood;
  }
}

/* ===================== Names (shared pool, two roles) ===================== */
async function loadKnownPartners() {
  try {
    const result = await window.storage.get(STORAGE_KEY_PARTNERS, true);
    knownPartners = result ? JSON.parse(result.value) : [];
  } catch (e) {
    knownPartners = [];
  }
  renderRunnerChips();
  renderPartnerChips();
}

function renderRunnerChips() {
  const container = document.getElementById('runner-chips');
  container.innerHTML = '';

  knownPartners.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = name;
    chip.dataset.name = name;
    if (selectedRunners.has(name)) chip.classList.add('selected');
    chip.addEventListener('click', () => toggleRunner(name));
    container.appendChild(chip);
  });
}

function renderPartnerChips() {
  const container = document.getElementById('partner-chips');
  container.innerHTML = '';

  knownPartners.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = name;
    chip.dataset.name = name;
    if (selectedPartners.has(name)) chip.classList.add('selected');
    chip.addEventListener('click', () => togglePartner(name));
    container.appendChild(chip);
  });
}

function toggleRunner(name) {
  if (selectedRunners.has(name)) {
    selectedRunners.delete(name);
  } else {
    selectedRunners.add(name);
  }
  renderRunnerChips();
}

function togglePartner(name) {
  if (selectedPartners.has(name)) {
    selectedPartners.delete(name);
  } else {
    selectedPartners.add(name);
  }
  renderPartnerChips();
}

async function addNewNameToPool(name) {
  if (!knownPartners.includes(name)) {
    knownPartners.push(name);
    try {
      await window.storage.set(STORAGE_KEY_PARTNERS, JSON.stringify(knownPartners), true);
    } catch (e) { console.error('Storage error', e); }
  }
  renderRunnerChips();
  renderPartnerChips();
}

/* ===================== Submit ===================== */
async function submitRecord() {
  if (isSubmitting) return;

  const date = document.getElementById('f-date').value;
  if (!date) {
    showFeedback('請選擇日期', false);
    return;
  }

  if (selectedRunners.size === 0) {
    showFeedback('請選擇至少一位跑步者', false);
    return;
  }

  const record = {
    date: date,
    minutes: durationMinutes,
    location: document.getElementById('f-location').value.trim(),
    distance: parseFloat(document.getElementById('f-distance').value) || null,
    runners: Array.from(selectedRunners),
    partners: Array.from(selectedPartners),
    mood: selectedMood,
    note: document.getElementById('f-note').value.trim(),
    secret: SHARED_SECRET
  };

  isSubmitting = true;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = '送出中…';

  try {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(record)
    });
    const result = await response.json();

    if (!result.success) {
      throw new Error(result.error || '未知錯誤');
    }

    showFeedback('已記錄！跑得好 ' + (selectedMood || '🎉'), true);
    resetForm();
  } catch (e) {
    console.error(e);
    showFeedback('送出失敗，請檢查網路或稍後再試', false);
  } finally {
    isSubmitting = false;
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = '送出紀錄';
  }
}

function resetForm() {
  document.getElementById('f-location').value = '';
  document.getElementById('f-distance').value = '';
  document.getElementById('f-note').value = '';
  selectedRunners.clear();
  selectedPartners.clear();
  selectedMood = null;
  durationMinutes = 30;
  document.getElementById('dur-display').innerHTML = '30<span>分鐘</span>';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  renderRunnerChips();
  renderPartnerChips();
}

function showFeedback(msg, success) {
  const el = document.getElementById('submit-feedback');
  el.textContent = msg;
  el.style.color = success ? 'var(--pulse)' : 'var(--accent-deep)';
  setTimeout(() => { el.textContent = ''; }, 3500);
}

/* ===================== Load & Stats ===================== */
async function loadAllRecords() {
  try {
    const response = await fetch(APPS_SCRIPT_URL);
    const result = await response.json();
    allRecords = (result.success && result.records) ? result.records : [];
  } catch (e) {
    console.error('Load error', e);
    allRecords = [];
  }
}

function getMonthRecords(monthDate) {
  const y = monthDate.getFullYear();
  const m = monthDate.getMonth();
  return allRecords.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear() === y && d.getMonth() === m;
  });
}

function changeMonth(delta) {
  viewingMonth.setMonth(viewingMonth.getMonth() + delta);
  renderStats();
}

async function renderStats() {
  await loadAllRecords();

  const y = viewingMonth.getFullYear();
  const m = viewingMonth.getMonth();
  document.getElementById('month-label').textContent = `${y} 年 ${m + 1} 月`;

  const records = getMonthRecords(viewingMonth).sort((a, b) => new Date(b.date) - new Date(a.date));

  const totalMinutes = records.reduce((s, r) => s + (r.minutes || 0), 0);
  const totalDistance = records.reduce((s, r) => s + (r.distance || 0), 0);

  document.getElementById('stat-sessions').textContent = records.length;
  document.getElementById('stat-minutes').textContent = totalMinutes;
  document.getElementById('stat-distance').textContent = totalDistance > 0 ? totalDistance.toFixed(1) : '–';

  renderLeaderboard(records);
  renderLogList(records);
  renderReportText(y, m, records, totalMinutes, totalDistance);
}

function renderLeaderboard(records) {
  const container = document.getElementById('leaderboard');

  const tally = {};
  records.forEach(r => {
    const names = r.runners && r.runners.length > 0 ? r.runners : [];
    names.forEach(name => {
      if (!tally[name]) tally[name] = { minutes: 0, sessions: 0 };
      tally[name].minutes += r.minutes || 0;
      tally[name].sessions += 1;
    });
  });

  const sorted = Object.entries(tally).sort((a, b) => b[1].minutes - a[1].minutes);

  if (sorted.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🏃</div>
      <div class="empty-state-text">這個月還沒有紀錄<br>記錄跑步者就會出現在排行榜上</div>
    </div>`;
    return;
  }

  const maxMinutes = sorted[0][1].minutes;
  container.innerHTML = sorted.map(([name, data], i) => `
    <div class="leaderboard-item">
      <div class="lb-rank ${i === 0 ? 'rank-1' : ''}">${i + 1}</div>
      <div style="flex:1">
        <div style="display:flex; justify-content:space-between;">
          <span class="lb-name">${escapeHtml(name)}</span>
          <span class="lb-meta">${data.sessions} 次 · ${data.minutes} 分鐘</span>
        </div>
        <div class="lb-bar-track"><div class="lb-bar-fill" style="width:${(data.minutes / maxMinutes * 100).toFixed(0)}%"></div></div>
      </div>
    </div>
  `).join('');
}

function renderLogList(records) {
  const container = document.getElementById('log-list');

  if (records.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🏃</div>
      <div class="empty-state-text">這個月還沒有紀錄<br>跑完之後記得來登錄一下</div>
    </div>`;
    return;
  }

  container.innerHTML = records.map(r => {
    const d = new Date(r.date);
    const dateStr = `${d.getMonth() + 1}/${d.getDate()}`;
    const runnerStr = r.runners && r.runners.length > 0 ? r.runners.join('、') : '（未填）';
    const partnerStr = r.partners && r.partners.length > 0 ? ' ＋ ' + r.partners.join('、') : '';
    const distStr = r.distance ? ` · ${r.distance}km` : '';
    const locStr = r.location ? ` · ${escapeHtml(r.location)}` : '';
    return `
      <div class="log-item">
        <div class="log-top">
          <span class="log-date">${dateStr}</span>
          <span class="log-duration">${r.minutes} 分鐘${distStr}</span>
        </div>
        <div class="log-detail">
          ${r.mood ? `<span class="log-mood">${r.mood}</span>` : ''}${escapeHtml(runnerStr)}${partnerStr ? escapeHtml(partnerStr) : ''}${locStr}
          ${r.note ? `<br>${escapeHtml(r.note)}` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderReportText(y, m, records, totalMinutes, totalDistance) {
  const box = document.getElementById('report-box');

  if (records.length === 0) {
    box.textContent = `${y} 年 ${m + 1} 月還沒有任何紀錄唷`;
    return;
  }

  const runnerTally = {};
  records.forEach(r => {
    (r.runners || []).forEach(name => {
      runnerTally[name] = (runnerTally[name] || 0) + (r.minutes || 0);
    });
  });
  const topRunners = Object.entries(runnerTally).sort((a, b) => b[1] - a[1]).slice(0, 5);

  const partnerTally = {};
  records.forEach(r => {
    (r.partners || []).forEach(name => {
      partnerTally[name] = (partnerTally[name] || 0) + 1;
    });
  });
  const topPartners = Object.entries(partnerTally).sort((a, b) => b[1] - a[1]).slice(0, 3);

  let text = `🏃 超慢跑社 ${y}年${m + 1}月結算報告\n`;
  text += `━━━━━━━━━━━━━\n`;
  text += `本月總場次：${records.length} 次\n`;
  text += `累積時間：${totalMinutes} 分鐘（約 ${(totalMinutes / 60).toFixed(1)} 小時）\n`;
  if (totalDistance > 0) text += `累積距離：${totalDistance.toFixed(1)} 公里\n`;

  if (topRunners.length > 0) {
    text += `\n🏆 跑步榜\n`;
    topRunners.forEach(([name, minutes], i) => {
      text += `${i + 1}. ${name} － ${minutes} 分鐘\n`;
    });
  }

  if (topPartners.length > 0) {
    text += `\n🤝 熱心陪跑\n`;
    topPartners.forEach(([name, count]) => {
      text += `${name}（${count} 次）　`;
    });
    text += `\n`;
  }

  text += `\n大家辛苦了，下個月繼續加油 💪`;

  box.textContent = text;
}

async function copyReport() {
  const text = document.getElementById('report-box').textContent;
  const btn = document.getElementById('copy-report-btn');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '已複製！貼到 LINE 就完成了';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '複製月報文字';
      btn.classList.remove('copied');
    }, 2500);
  } catch (e) {
    btn.textContent = '複製失敗，請手動選取文字';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
